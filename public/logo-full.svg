<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" width="360" height="80">
  <defs>
    <linearGradient id="nGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b8dee"/>
      <stop offset="50%" stop-color="#7b6cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1321"/>
      <stop offset="100%" stop-color="#0a0e17"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5b8dee" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#5b8dee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#5b8dee" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Icon circle -->
  <circle cx="40" cy="40" r="36" fill="url(#bgGrad)"/>
  <circle cx="40" cy="40" r="35" fill="none" stroke="url(#borderGrad)" stroke-width="1"/>
  <circle cx="40" cy="40" r="28" fill="url(#glow)"/>

  <!-- N letterform in the circle -->
  <g filter="url(#shadow)" transform="translate(40, 40)">
    <path d="
      M -14, 15
      L -14, -15
      L -7, -15
      L 7, 8
      L 7, -15
      L 14, -15
      L 14, 15
      L 7, 15
      L -7, -8
      L -7, 15
      Z
    " fill="url(#nGrad)"/>
  </g>

  <!-- "NOCTIS" text -->
  <text x="90" y="48" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="600" letter-spacing="3" fill="url(#textGrad)">NOCTIS</text>

  <!-- Subtitle -->
  <text x="91" y="64" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" font-weight="400" letter-spacing="4" fill="#64748b">QUANTITATIVE INTELLIGENCE</text>
</svg>
