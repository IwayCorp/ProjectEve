<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main gradient for the N letterform -->
    <linearGradient id="nGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b8dee"/>
      <stop offset="50%" stop-color="#7b6cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Glass background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1321"/>
      <stop offset="100%" stop-color="#0a0e17"/>
    </linearGradient>

    <!-- Glow effect -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5b8dee" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#5b8dee" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#5b8dee" stop-opacity="0"/>
    </radialGradient>

    <!-- Glass overlay -->
    <linearGradient id="glassOverlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Subtle border gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.12"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#5b8dee" flood-opacity="0.25"/>
    </filter>

    <!-- Inner glow for the N -->
    <filter id="nGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>

  <!-- Subtle border -->
  <circle cx="256" cy="256" r="238" fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>

  <!-- Glow behind the N -->
  <circle cx="256" cy="256" r="180" fill="url(#glow)"/>

  <!-- Glass overlay on top half -->
  <clipPath id="circleClip">
    <circle cx="256" cy="256" r="238"/>
  </clipPath>
  <rect x="0" y="0" width="512" height="280" fill="url(#glassOverlay)" clip-path="url(#circleClip)"/>

  <!-- The N letterform — geometric, modern, slightly angular -->
  <g filter="url(#shadow)" transform="translate(256, 256)">
    <!-- N shape: left vertical, diagonal, right vertical -->
    <path d="
      M -88, 95
      L -88, -95
      L -48, -95
      L 48, 55
      L 48, -95
      L 88, -95
      L 88, 95
      L 48, 95
      L -48, -55
      L -48, 95
      Z
    " fill="url(#nGrad)"/>
  </g>

  <!-- Subtle top-left shine on the N -->
  <g transform="translate(256, 256)">
    <path d="
      M -88, -95
      L -48, -95
      L -48, -55
      L -88, -55
      Z
    " fill="white" opacity="0.06"/>
  </g>
</svg>
